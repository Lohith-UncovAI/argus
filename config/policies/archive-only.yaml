profile: ARCHIVE_ONLY
default_action: REVIEW
default_summary: Archive-only scans default to review when no higher-severity rule matches.
rules:
  - id: archive-quarantine-malware
    priority: 1000
    when: {category: malware, state_in: [CONFIRMED, HIGHLY_LIKELY]}
    action: QUARANTINE
  - id: archive-review-active-prompt
    priority: 700
    when: {category: prompt_injection, state_in: [CONFIRMED, HIGHLY_LIKELY]}
    action: REVIEW
