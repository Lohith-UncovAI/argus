profile: RAG_INGESTION
default_action: ALLOW_RECONSTRUCTED_ONLY
default_summary: RAG ingestion defaults to the validated reconstructed candidate.
rules:
  - id: rag-block-active-prompt
    priority: 900
    when: {category: prompt_injection, state_in: [CONFIRMED, HIGHLY_LIKELY]}
    action: BLOCK
  - id: rag-review-phishing
    priority: 675
    when: {category: phishing, state_in: [CONFIRMED, HIGHLY_LIKELY, POSSIBLE]}
    action: REVIEW
    summary: Phishing or deceptive login indicators need review before RAG ingestion.
  - id: rag-review-privacy
    priority: 650
    when: {category: privacy, state: CONFIRMED}
    action: REVIEW
