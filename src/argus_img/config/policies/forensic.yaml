profile: SECURITY_FORENSICS
default_action: REVIEW
default_summary: Forensic scans default to review so analysts retain custody of results.
rules:
  - id: forensic-quarantine-malware
    priority: 1000
    when: {category: malware, state_in: [CONFIRMED, HIGHLY_LIKELY]}
    action: QUARANTINE
  - id: forensic-review-any-confirmed
    priority: 200
    when: {state: CONFIRMED}
    action: REVIEW
